<!doctype html>
<!--
  Offline fallback shell for the Capacitor app. The app normally loads the live
  site (see capacitor.config.ts `server.url`); this bundled page is what the
  WebView falls back to when there is no network at all on launch.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>sneakerfeature</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0a0a0a;
        color: #fafafa;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
      }
      .wrap {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 24px;
        gap: 14px;
      }
      .logo {
        font-size: 28px;
        font-weight: 700;
        letter-spacing: -0.02em;
      }
      .msg {
        max-width: 280px;
        color: #a3a3a3;
        line-height: 1.5;
        font-size: 15px;
      }
      button {
        margin-top: 8px;
        padding: 10px 22px;
        border: 0;
        border-radius: 9999px;
        background: #fafafa;
        color: #0a0a0a;
        font-size: 15px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="logo">👟 sneakerfeature</div>
      <div class="msg">
        无法连接到网络。请检查你的网络连接后重试。<br />
        Couldn't reach the network. Check your connection and try again.
      </div>
      <button onclick="location.reload()">重试 / Retry</button>
    </div>
    <script>
      // This local page is shown when the remote site can't be reached at
      // launch. The native splash uses launchAutoHide:false (see
      // capacitor.config.ts), so hide it here too — otherwise an offline launch
      // would sit behind the splash forever and look like a frozen black screen.
      document.addEventListener("DOMContentLoaded", function () {
        try {
          window.Capacitor.Plugins.SplashScreen.hide();
        } catch (e) {
          /* splash plugin unavailable */
        }
      });
    </script>
  </body>
</html>
